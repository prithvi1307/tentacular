name: Build Engine Image

on:
  push:
    branches:
      - main
    paths:
      - 'engine/**'
      - 'Makefile'
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/randybias/tentacular-engine

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE }}:${{ github.sha }}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS,${{ env.IMAGE }}:${VERSION}"
            # Only tag as :latest for non-prerelease tags
            if [[ "$VERSION" != *-rc* && "$VERSION" != *-beta* && "$VERSION" != *-alpha* ]]; then
              TAGS="$TAGS,${{ env.IMAGE }}:latest"
            fi
          else
            TAGS="$TAGS,${{ env.IMAGE }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: engine/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
